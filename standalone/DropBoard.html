@layer base {
  *, *::before, *::after {
    box-sizing: border-box;
  }
  *:not(dialog) {
    margin: 0;
  }
  html {
    scroll-behavior: smooth;
  }
  body {
    min-height: 100vh;
    background: var(--color-canvas);
    color: var(--color-ink);
    font-family: var(--font-body);
    line-height: 1.47;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  img, picture, video, canvas, svg {
    display: block;
    max-width: 100%;
  }
  input, button, textarea, select {
    font: inherit;
    color: inherit;
  }
  button {
    background: none;
  }
  a {
    color: var(--color-primary);
    text-decoration: none;
  }
  a:hover, a:focus-visible {
    text-decoration: underline;
  }
  h1, h2, h3, h4, h5, h6 {
    color: var(--color-ink);
    font-family: var(--font-body);
    font-weight: 600;
    line-height: 1.12;
    text-wrap: balance;
  }
  p, li, td, th {
    overflow-wrap: break-word;
  }
  code, kbd, pre, samp {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  }
  code {
    background: var(--color-canvas-parchment);
    border: 1px solid var(--color-hairline);
    border-radius: 4px;
    padding: 0.05rem 0.3rem;
    color: var(--color-ink);
  }
  pre {
    overflow: auto;
    background: var(--color-canvas-parchment);
    border: 1px solid var(--color-hairline);
    border-radius: 4px;
    padding: 0.9rem 1rem;
  }
  blockquote {
    border-left: 4px solid var(--color-primary);
    padding-left: 1rem;
  }
  strong {
    color: var(--color-ink);
    font-weight: 600;
  }
}
@layer components {
  .dropboard-markdown > :first-child {
    margin-top: 0;
  }
  .dropboard-markdown > :last-child {
    margin-bottom: 0;
  }
  .dropboard-markdown p, .dropboard-markdown ul, .dropboard-markdown ol, .dropboard-markdown pre, .dropboard-markdown blockquote, .dropboard-markdown h1, .dropboard-markdown h2, .dropboard-markdown h3, .dropboard-markdown h4 {
    margin: 0 0 12px;
  }
  .dropboard-markdown ul, .dropboard-markdown ol {
    padding-left: 1.35rem;
  }
  .dropboard-markdown a {
    color: var(--color-primary);
    text-decoration: underline;
  }
  .dropboard-markdown code {
    background: var(--color-canvas-parchment);
  }
  .dropboard-markdown pre {
    max-width: 100%;
  }
}
